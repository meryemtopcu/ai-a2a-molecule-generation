name: Pocket2Mol
channels:
  - pytorch
  - conda-forge
  - pyg
  - defaults

dependencies:
  - python=3.9
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - scikit-learn

  # PyTorch (CPU / MPS compatible on Apple Silicon)
  - pytorch
  - torchvision
  - torchaudio

  # Common utilities used in ML repos
  - tqdm
  - pyyaml

  # Optional but often required
  - rdkit

  # Install remaining pip deps from repo
  - pip:
      - biopython
      - networkx